x-common: &common
  restart: unless-stopped
  networks:
    - ai-starter

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-n8n}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_to_secure_password}
  POSTGRES_DB: ${POSTGRES_DB:-n8n}

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      <<: *postgres-env
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: n8n-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n:
    <<: *common
    image: n8nio/n8n:latest
    container_name: n8n
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-change_me_to_secure_password}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_URL=https://n8n.yourdomain.com
      - WEBHOOK_URL=https://n8n.yourdomain.com
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./scripts/n8n-entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Image Upload API — self-hosted imgbb replacement.
  # n8n workflows: POST http://image-upload:8001/upload
  # Host port 8010.
  # =========================================================================
  image-upload:
    <<: *common
    image: mimnets/n8n-image-upload:latest
    # To build from local source instead, replace ↑ with ↓:
    # build:
    #   context: ./image-upload-server
    #   dockerfile: Dockerfile
    container_name: n8n-image-upload
    ports:
      - "8010:8001"
    environment:
      - PORT=8001
      - UPLOAD_DIR=/app/uploads
      - UPLOAD_API_KEY=${UPLOAD_API_KEY:-}
      - MAX_FILE_SIZE_MB=${UPLOAD_MAX_FILE_SIZE_MB:-10}
      - BASE_URL=${UPLOAD_BASE_URL:-}
    volumes:
      - image_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # Camofox Browser — anti-detection headless browser powered by Camoufox (Firefox).
  # C++-level fingerprint spoofing for LinkedIn/Facebook automation.
  # REST API: navigate, click, type, snapshot with stable element refs.
  # Sessions auto-persist — log in once via VNC, reuse forever.
  # n8n workflows: http://camofox:9377/tabs
  # VNC (noVNC):   http://<host>:6080/vnc.html
  # =========================================================================
  camofox:
    <<: *common
    image: ghcr.io/jo-inc/camofox-browser:latest
    container_name: camofox
    ports:
      - "9377:9377"   # Camofox REST API
      - "6080:6080"   # noVNC web client
    environment:
      - CAMOFOX_PORT=9377
      - CAMOFOX_API_KEY=${CAMOFOX_API_KEY:-}
      - ENABLE_VNC=true
      - PROXY_HOST=${LINKEDIN_PROXY_HOST:-}
      - PROXY_PORT=${LINKEDIN_PROXY_PORT:-}
      - PROXY_USERNAME=${LINKEDIN_PROXY_USER:-}
      - PROXY_PASSWORD=${LINKEDIN_PROXY_PASS:-}
    volumes:
      - camofox_profiles:/home/node/.camofox/profiles
      - camofox_cookies:/home/node/.camofox/cookies
    shm_size: '1gb'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9377/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ai-starter:
    driver: bridge

volumes:
  postgres_storage:
  n8n_storage:
  qdrant_storage:
  image_uploads:
  camofox_profiles:
  camofox_cookies:
