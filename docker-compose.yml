x-common: &common
  restart: unless-stopped
  networks:
    - demo

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-n8n}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_to_secure_password}
  POSTGRES_DB: ${POSTGRES_DB:-n8n}

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      <<: *postgres-env
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: n8n-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n-import:
    image: alpine:latest
    container_name: n8n-import
    volumes:
      - n8n_storage:/data/n8n
      - shared:/data/shared
      - ./n8n/demo-data:/data/demo-data:ro
    entrypoint:
      - sh
      - -c
    command:
      - |
        if [ -f /data/n8n/config ]; then
          echo "n8n already initialized, skipping import"
        else
          echo "First run, importing demo data..."
          mkdir -p /data/shared/demo
          cp -r /data/demo-data/* /data/shared/demo/ 2>/dev/null || echo "No demo data to import"
          touch /data/n8n/config
          echo "Demo data import complete"
        fi
    networks:
      - demo

  n8n:
    <<: *common
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-change_me_to_secure_password}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
    volumes:
      - n8n_storage:/home/node/.n8n
      - shared:/data/shared
      - ./n8n/demo-data:/data/demo-data:ro
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  demo:
    driver: bridge

volumes:
  postgres_storage:
  n8n_storage:
  qdrant_storage:
  shared:
