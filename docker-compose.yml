x-common: &common
  restart: unless-stopped
  networks:
    - ai-starter

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-n8n}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_to_secure_password}
  POSTGRES_DB: ${POSTGRES_DB:-n8n}

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      <<: *postgres-env
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: n8n-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n:
    <<: *common
    image: n8nio/n8n:latest
    container_name: n8n
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-change_me_to_secure_password}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_URL=https://n8n.yourdomain.com
      - WEBHOOK_URL=https://n8n.yourdomain.com
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./scripts/n8n-entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Browser Use API — self-contained REST bridge for browser automation.
  # n8n workflows call this via HTTP Request nodes at http://browser-api:8000
  # Host port 8001 (8000 is used by Portainer).
  # Inspired by the official browser-use/web-ui project:
  # https://github.com/browser-use/web-ui
  # =========================================================================
  browser-api:
    <<: *common
    build:
      context: ./browser_api
      dockerfile: Dockerfile
    container_name: browser-n8n-api
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      # OpenAI / DeepSeek (DeepSeek uses OPENAI_BASE_URL override)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_ID=${OPENAI_MODEL_ID:-gpt-4o}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT:-https://api.openai.com/v1}
      # DeepSeek (native env vars)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_ENDPOINT=${DEEPSEEK_ENDPOINT:-https://api.deepseek.com}
      - DEEPSEEK_MODEL_ID=${DEEPSEEK_MODEL_ID:-deepseek-chat}
      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL_ID=${ANTHROPIC_MODEL_ID:-claude-sonnet-4-6}
      - ANTHROPIC_ENDPOINT=${ANTHROPIC_ENDPOINT:-https://api.anthropic.com}
      # Google Gemini
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL_ID=${GOOGLE_MODEL_ID:-gemini-2.0-flash}
      # Mistral
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL_ID=${MISTRAL_MODEL_ID:-mistral-large-latest}
      - MISTRAL_ENDPOINT=${MISTRAL_ENDPOINT:-https://api.mistral.ai/v1}
      # Ollama (local)
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://localhost:11434}
      - OLLAMA_MODEL_ID=${OLLAMA_MODEL_ID:-llama3}
      # Azure OpenAI
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2025-01-01-preview}
      # Browser settings
      - BROWSER_USE_HEADFUL=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - browser_tasks:/app/data
    shm_size: '2gb'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =========================================================================
  # Browser Use WebUI — human-facing Gradio interface + noVNC live browser view.
  # Built directly from the official repo (no local clone, no ghcr.io auth).
  # https://github.com/browser-use/web-ui
  # =========================================================================
  browser-webui:
    <<: *common
    build:
      context: https://github.com/browser-use/web-ui.git#main
      dockerfile: Dockerfile
    container_name: browser-webui
    ports:
      - "7788:7788"    # Gradio WebUI
      - "6080:6080"    # noVNC (browser live view — password from VNC_PASSWORD)
      - "5901:5901"    # VNC (direct connection)
      - "9222:9222"    # Chrome DevTools Protocol
    environment:
      # LLM Providers (shares your .env keys)
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_ENDPOINT=${ANTHROPIC_ENDPOINT:-https://api.anthropic.com}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2025-01-01-preview}
      - DEEPSEEK_ENDPOINT=${DEEPSEEK_ENDPOINT:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://localhost:11434}
      - MISTRAL_ENDPOINT=${MISTRAL_ENDPOINT:-https://api.mistral.ai/v1}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      # Browser Settings
      - BROWSER_USE_LOGGING_LEVEL=${LOG_LEVEL:-info}
      - RESOLUTION=${BROWSER_RESOLUTION:-1920x1080x24}
      - RESOLUTION_WIDTH=${BROWSER_RESOLUTION_WIDTH:-1920}
      - RESOLUTION_HEIGHT=${BROWSER_RESOLUTION_HEIGHT:-1080}
      - VNC_PASSWORD=${VNC_PASSWORD:-vncpassword}
      - ANONYMIZED_TELEMETRY=false
      - KEEP_BROWSER_OPEN=true
    volumes:
      - browser_webui_data:/app/data
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5901 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  ai-starter:
    driver: bridge

volumes:
  postgres_storage:
  n8n_storage:
  qdrant_storage:
  browser_tasks:
  browser_webui_data:
