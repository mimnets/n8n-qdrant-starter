x-common: &common
  restart: unless-stopped
  networks:
    - ai-starter

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-n8n}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_to_secure_password}
  POSTGRES_DB: ${POSTGRES_DB:-n8n}

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      <<: *postgres-env
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: n8n-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n:
    <<: *common
    image: n8nio/n8n:latest
    container_name: n8n
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-change_me_to_secure_password}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_URL=https://n8n.yourdomain.com
      - WEBHOOK_URL=https://n8n.yourdomain.com
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./scripts/n8n-entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Image Upload API — self-hosted imgbb replacement.
  # n8n workflows: POST http://image-upload:8001/upload
  # Host port 8010.
  # =========================================================================
  image-upload:
    <<: *common
    build:
      context: ./image-upload-server
      dockerfile: Dockerfile
    container_name: n8n-image-upload
    ports:
      - "8010:8001"
    environment:
      - PORT=8001
      - UPLOAD_DIR=/app/uploads
      - UPLOAD_API_KEY=${UPLOAD_API_KEY:-}
      - MAX_FILE_SIZE_MB=${UPLOAD_MAX_FILE_SIZE_MB:-10}
      - BASE_URL=${UPLOAD_BASE_URL:-}
    volumes:
      - image_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # Browser Use API — persistent browser with cookie persistence.
  # n8n workflows: POST http://browser-api:8000/api/run
  # Host port 7999 (8000/8001 used by Portainer/other services).
  # =========================================================================
  browser-api:
    <<: *common
    image: mimnets/browser-use-api:latest
    # To build from local source instead, replace ↑ with ↓:
    # build:
    #   context: ./browser_api
    #   dockerfile: Dockerfile
    container_name: browser-n8n-api
    ports:
      - "7999:8000"
    environment:
      - PORT=8000
      - BROWSER_USE_LOGGING_LEVEL=${LOG_LEVEL:-info}
      - BROWSER_USE_HEADFUL=false
      # LLM Providers
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_ENDPOINT=${DEEPSEEK_ENDPOINT:-https://api.deepseek.com}
      - DEEPSEEK_MODEL_ID=${DEEPSEEK_MODEL_ID:-deepseek-chat}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_ID=${OPENAI_MODEL_ID:-gpt-4o}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT:-https://api.openai.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL_ID=${ANTHROPIC_MODEL_ID:-claude-sonnet-4-6}
      - ANTHROPIC_ENDPOINT=${ANTHROPIC_ENDPOINT:-https://api.anthropic.com}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL_ID=${GOOGLE_MODEL_ID:-gemini-2.0-flash}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL_ID=${MISTRAL_MODEL_ID:-mistral-large-latest}
      - MISTRAL_ENDPOINT=${MISTRAL_ENDPOINT:-https://api.mistral.ai/v1}
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://localhost:11434}
      - OLLAMA_MODEL_ID=${OLLAMA_MODEL_ID:-llama3}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2025-01-01-preview}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-deepseek}
    volumes:
      - ./browser_api/browser_profile:/app/browser_profile
    shm_size: '2gb'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ai-starter:
    driver: bridge

volumes:
  postgres_storage:
  n8n_storage:
  qdrant_storage:
  image_uploads:
