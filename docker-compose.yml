x-common: &common
  restart: unless-stopped
  networks:
    - ai-starter

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-n8n}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_to_secure_password}
  POSTGRES_DB: ${POSTGRES_DB:-n8n}

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      <<: *postgres-env
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    container_name: n8n-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n:
    <<: *common
    image: n8nio/n8n:latest
    container_name: n8n
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-change_me_to_secure_password}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_URL=https://n8n.yourdomain.com
      - WEBHOOK_URL=https://n8n.yourdomain.com
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./scripts/n8n-entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Image Upload API — self-hosted imgbb replacement.
  # n8n workflows: POST http://image-upload:8001/upload
  # Host port 8010.
  # =========================================================================
  image-upload:
    <<: *common
    image: mimnets/n8n-image-upload:latest
    # To build from local source instead, replace ↑ with ↓:
    # build:
    #   context: ./image-upload-server
    #   dockerfile: Dockerfile
    container_name: n8n-image-upload
    ports:
      - "8010:8001"
    environment:
      - PORT=8001
      - UPLOAD_DIR=/app/uploads
      - UPLOAD_API_KEY=${UPLOAD_API_KEY:-}
      - MAX_FILE_SIZE_MB=${UPLOAD_MAX_FILE_SIZE_MB:-10}
      - BASE_URL=${UPLOAD_BASE_URL:-}
    volumes:
      - image_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # Stealth Browser API — anti-detection Playwright service for LinkedIn/Facebook.
  # Uses full stealth injection, human-like behavior, persistent profiles.
  # n8n workflows: POST http://stealth-browser:8001/api/run
  # VNC (noVNC):   http://<host>:6081/vnc.html
  # VNC (raw):     <host>:5901
  # =========================================================================
  stealth-browser:
    <<: *common
    image: mimnets/stealth-browser-api:latest
    # To build from local source instead:
    # build:
    #   context: ./stealth-browser
    #   dockerfile: Dockerfile
    container_name: stealth-browser
    ports:
      - "8001:8001"   # Stealth API
      - "6081:6080"   # noVNC web client
      - "5901:5900"   # raw VNC
    environment:
      - API_PORT=8001
      - PROFILE_DIR=/app/profiles
      - COOKIE_DIR=/app/cookies
      - HEADLESS=false
      - LOG_LEVEL=INFO
      - CHROME_PROXY=${CHROME_PROXY:-}
      - VNC_PASSWORD=${VNC_PASSWORD:-}
    volumes:
      - stealth_profiles:/app/profiles
      - stealth_cookies:/app/cookies
    shm_size: '2gb'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ai-starter:
    driver: bridge

volumes:
  postgres_storage:
  n8n_storage:
  qdrant_storage:
  image_uploads:
  stealth_profiles:
  stealth_cookies:
