# CutEngine — self-hosted Shotstack-compatible video render engine.
# REST API: POST http://cutengine:3000/edit/v1/render
# Health: GET http://localhost:3000/health
#
# Supports: Ken Burns zoom effects (zoomIn/zoomOut/slideLeft/slideRight),
# 20+ transitions, captions, text overlays, multi-track audio mixing.
#
# Requires: git clone https://github.com/jjjames38/cutengine.git ./cutengine
# before first startup (see README step 6).
#
# Integrates with the existing ai-starter network so n8n
# can reach it internally at http://cutengine:3000

x-common: &common
  restart: unless-stopped
  networks:
    - ai-starter

services:
  cutengine-redis:
    <<: *common
    image: redis:7-alpine
    container_name: cutengine-redis
    volumes:
      - cutengine_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  cutengine-chromium:
    <<: *common
    image: browserless/chrome:latest
    container_name: cutengine-chromium
    environment:
      - MAX_CONCURRENT_SESSIONS=4
      - CONNECTION_TIMEOUT=3600000
    healthcheck:
      test: ["CMD", "node", "/home/browserless/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  cutengine:
    <<: *common
    build:
      context: ./cutengine
      dockerfile: docker/Dockerfile
    container_name: cutengine
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://cutengine-redis:6379
      - CHROMIUM_WS=ws://cutengine-chromium:3000
      - STORAGE_DRIVER=local
      - STORAGE_PATH=/data/assets
      - PORT=3000
    volumes:
      - cutengine_assets:/data/assets
      - cutengine_db:/data
    depends_on:
      cutengine-redis:
        condition: service_healthy
      cutengine-chromium:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

networks:
  ai-starter:
    external: true
    name: n8n-qdrant-starter_ai-starter

volumes:
  cutengine_assets:
  cutengine_db:
  cutengine_redis_data:
