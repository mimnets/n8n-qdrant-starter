# VidAPI — self-hosted video rendering API powered by Editly.
# REST API: POST /v1/renders, GET /v1/renders/{id}, GET /v1/renders/{id}/download
# Swagger docs: http://localhost:8089/docs
#
# Integrates with the existing ai-starter network so n8n
# can reach it internally at http://vidapi-api:8000

x-common: &common
  restart: unless-stopped
  networks:
    - ai-starter

services:
  vidapi-redis:
    <<: *common
    image: redis:7-alpine
    container_name: vidapi-redis
    volumes:
      - vidapi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  vidapi-api:
    <<: *common
    build:
      context: ./vidapi
      dockerfile: Dockerfile.api
    container_name: vidapi-api
    ports:
      - "8089:8000"
    env_file:
      - ./vidapi/.env.docker
    environment:
      - REDIS_URL=redis://vidapi-redis:6379
      - STORAGE_ROOT=data
      - RENDER_WORKSPACE_ROOT=data/renders
      - EDITLY_BIN=editly
      - FFMPEG_BIN=ffmpeg
      - ASSET_CACHE_ROOT=data/assets
      - DATABASE_URL=sqlite+aiosqlite:///./data/vidapi.db
      - WORKSPACE_CLEANUP_ENABLED=true
      - WORKSPACE_CLEANUP_KEEP_ON_FAILURE=true
      - MAX_RENDER_DURATION_SECONDS=120
      - RENDER_TIMEOUT_SECONDS=600
      - DEBUG=true
      - ALLOWED_HOSTS=["localhost","127.0.0.1","vidapi-api","*","test","testserver"]
      - CORS_ORIGINS=["*","http://localhost:5678","http://n8n:5678","https://n8n.mimnets.com"]
    volumes:
      - vidapi_data:/app/data
    depends_on:
      vidapi-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  kokoro-tts:
    <<: *common
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    ports:
      - "8880:8880"
    environment:
      - KOKORO_API_KEY=${KOKORO_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/v1/audio/voices"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  vidapi-worker:
    <<: *common
    build:
      context: ./vidapi
      dockerfile: Dockerfile.worker
    container_name: vidapi-worker
    env_file:
      - ./vidapi/.env.docker
    environment:
      - REDIS_URL=redis://vidapi-redis:6379
      - API_HEALTH_URL=http://vidapi-api:8000/v1/health
      - STORAGE_ROOT=data
      - RENDER_WORKSPACE_ROOT=data/renders
      - EDITLY_BIN=editly
      - FFMPEG_BIN=ffmpeg
      - ASSET_CACHE_ROOT=data/assets
      - DATABASE_URL=sqlite+aiosqlite:///./data/vidapi.db
      - WORKSPACE_CLEANUP_ENABLED=true
      - WORKSPACE_CLEANUP_KEEP_ON_FAILURE=true
      - MAX_RENDER_DURATION_SECONDS=120
      - RENDER_TIMEOUT_SECONDS=600
    volumes:
      - vidapi_data:/app/data
    depends_on:
      vidapi-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/worker-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

networks:
  ai-starter:
    external: true
    name: n8n-qdrant-starter_ai-starter

volumes:
  vidapi_data:
  vidapi_redis_data:
